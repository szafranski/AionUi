name: Mirror Managed ACP Tools

on:
  workflow_dispatch:
    inputs:
      codex_version:
        description: 'Codex ACP version to package (for example 0.14.0)'
        required: true
        default: '0.14.0'
        type: string
      claude_version:
        description: 'Claude ACP version to package (for example 0.39.0)'
        required: true
        default: '0.39.0'
        type: string
      overwrite:
        description: 'Overwrite existing S3 objects'
        required: true
        default: false
        type: boolean
      write_root_manifest:
        description: 'Also upload managed/acp/manifest.json'
        required: true
        default: false
        type: boolean

permissions:
  id-token: write
  contents: read

jobs:
  mirror:
    name: Package and mirror managed ACP artifacts
    runs-on: ubuntu-latest
    env:
      AWS_S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}
      MANAGED_ACP_OVERWRITE: ${{ inputs.overwrite }}
      MANAGED_ACP_WRITE_ROOT_MANIFEST: ${{ inputs.write_root_manifest }}
      CODEX_ACP_VERSION: ${{ inputs.codex_version }}
      CLAUDE_ACP_VERSION: ${{ inputs.claude_version }}
      MANAGED_ACP_TARGETS: darwin-arm64,darwin-x64,linux-x64,linux-arm64,win32-x64,win32-arm64
      MANAGED_ACP_PREFIX: managed/acp
      MANAGED_ACP_CDN_BASE: https://static.aionui.com/managed/acp
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install packaging dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y zstd zip

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Validate inputs
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${AWS_S3_BUCKET}" ]]; then
            echo "::error::Missing required secret AWS_S3_BUCKET."
            exit 1
          fi

          sanitize_version() {
            local value="$1"
            value="${value#v}"
            case "${value}" in
              ''|*[!0-9.]*)
                echo "::error::Invalid version: $1"
                exit 1
                ;;
            esac
          }

          sanitize_version "${CODEX_ACP_VERSION}"
          sanitize_version "${CLAUDE_ACP_VERSION}"

          echo "Codex ACP version : ${CODEX_ACP_VERSION}"
          echo "Claude ACP version: ${CLAUDE_ACP_VERSION}"
          echo "Targets           : ${MANAGED_ACP_TARGETS}"
          echo "Bucket            : ${AWS_S3_BUCKET}"
          echo "Overwrite         : ${MANAGED_ACP_OVERWRITE}"
          echo "Root manifest     : ${MANAGED_ACP_WRITE_ROOT_MANIFEST}"

      - name: Package and upload managed ACP artifacts
        shell: bash
        run: |
          set -euo pipefail
          chmod +x ./scripts/prepare-managed-acp-tools.sh
          ./scripts/prepare-managed-acp-tools.sh

      - name: Summary
        shell: bash
        run: |
          {
            echo "## Managed ACP artifacts mirrored"
            echo ""
            echo "- Codex ACP manifest: \`https://static.aionui.com/managed/acp/codex-acp/${CODEX_ACP_VERSION}/manifest.json\`"
            echo "- Claude ACP manifest: \`https://static.aionui.com/managed/acp/claude-agent-acp/${CLAUDE_ACP_VERSION}/manifest.json\`"
            echo "- Targets: \`${MANAGED_ACP_TARGETS}\`"
            echo "- Bucket prefix: \`s3://${AWS_S3_BUCKET}/${MANAGED_ACP_PREFIX}/\`"
          } >> "$GITHUB_STEP_SUMMARY"
